name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.1.0)"
        required: true

permissions:
  contents: write

jobs:
  release:
    name: Build and publish
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: true

      - name: Resolve tag
        id: tag
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build binaries
        env:
          CGO_ENABLED: "0"
          VERSION: ${{ steps.tag.outputs.tag }}
        run: |
          mkdir -p dist
          LDFLAGS="-s -w -X main.version=${VERSION}"
          for arch in amd64 arm64; do
            out="dist/agentdesk-linux-${arch}"
            echo "==> building ${out}"
            GOOS=linux GOARCH=${arch} go build -trimpath -ldflags "${LDFLAGS}" -o "${out}" .
            (cd dist && sha256sum "agentdesk-linux-${arch}" >> checksums.txt)
          done
          ls -la dist

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.tag }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            dist/agentdesk-linux-amd64
            dist/agentdesk-linux-arm64
            dist/checksums.txt
